<ng-container *ngIf="loader then loaderBox else dataBox"></ng-container>

<ng-template #loaderBox>
  <m-loader [theme]="{ width: '100%', 'border-radius': '15px', height: '200px' }"></m-loader>
</ng-template>

<ng-template #dataBox>
  <section class="evaluation-score-widget">
    <p class="text-center">ผลการประเมินแยกตามกองบัญชาการ</p>
    <apx-chart [series]="chartOptions.series" [chart]="chartOptions.chart" [dataLabels]="chartOptions.dataLabels"
      [plotOptions]="chartOptions.plotOptions" [yaxis]="chartOptions.yaxis" [legend]="chartOptions.legend"
      [fill]="chartOptions.fill" [stroke]="chartOptions.stroke" [tooltip]="chartOptions.tooltip"
      [xaxis]="chartOptions.xaxis" [colors]="chartOptions.colors" [responsive]="chartOptions.responsive"></apx-chart>
  </section>
</ng-template>
