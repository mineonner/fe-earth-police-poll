<ng-container *ngIf="loader then loaderBox else dataBox"></ng-container>

<ng-template #loaderBox>
  <m-loader [theme]="{ width: '100%', 'border-radius': '15px', height: '200px' }"></m-loader>
</ng-template>

<ng-template #dataBox>
  <section class="evaluation-score-widget">
    <div *ngIf="isShowAverageScore" class="satisfaction-content">
      <p>คะแนนความพึงพอใจเฉลี่ย</p>
      <p>{{satisfactionScore}}</p>
    </div>

    <apx-chart #chart [series]="chartOptions.series" [chart]="chartOptions.chart" [dataLabels]="chartOptions.dataLabels"
      *ngIf="isShowFourTypeScore" [plotOptions]="chartOptions.plotOptions" [yaxis]="chartOptions.yaxis"
      [legend]="chartOptions.legend" [fill]="chartOptions.fill" [stroke]="chartOptions.stroke"
      [tooltip]="chartOptions.tooltip" [xaxis]="chartOptions.xaxis" [colors]="chartOptions.colors"
      [responsive]="chartOptions.responsive"></apx-chart>

  </section>
</ng-template>
