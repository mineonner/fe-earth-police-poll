<m-dropdown [title]="'ปีที่แสดงการประเมิน'" [(value)]="years" [option]="yearsOption" [disabled]="yearsOption.length == 0"></m-dropdown>

<mat-tab-group (selectedTabChange)="onSelectedTabChange($event)" [(selectedIndex)]="selectedTabIndex">

  <mat-tab label="ภาพรวมทั้งหมด">
    <ng-template matTabContent>
      <overview [years]="years"></overview>
    </ng-template>
  </mat-tab>

  <mat-tab label="บช.น./ภ.1-9">
    <ng-template matTabContent>
      <metropolitan-police-bureau [years]="years"></metropolitan-police-bureau>
    </ng-template>
  </mat-tab>

  <mat-tab label="สตม.">
    <ng-template matTabContent>
      <immigration-bureau [years]="years"></immigration-bureau>
    </ng-template>
  </mat-tab>

  <mat-tab label="บช.ทท.">
    <ng-template matTabContent>
      <tourist-police-headquarters [years]="years"></tourist-police-headquarters>
    </ng-template>
  </mat-tab>

  <mat-tab label="บช.ก.">
    <ng-template matTabContent>
      <central-investigation-bureau [years]="years"></central-investigation-bureau>
    </ng-template>
  </mat-tab>

  <mat-tab label="บช.ส.">
    <ng-template matTabContent>
      <police-special-branch-headquarters [years]="years"></police-special-branch-headquarters>
    </ng-template>
  </mat-tab>

  <mat-tab label="สพฐ.ตร.">
    <ng-template matTabContent>
      <office-of-prove-evidence [years]="years"></office-of-prove-evidence>
    </ng-template>
  </mat-tab>

  <mat-tab label="รพ.ตร.">
    <ng-template matTabContent>
      <police-general-hospital [years]="years"></police-general-hospital>
    </ng-template>
  </mat-tab>

</mat-tab-group>
